<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirming Your Account - Appetite</title>
    <style>
        :root {
            --primary: #FF4D00;
            --bg: #121212;
            --text: #FFFFFF;
            --text-secondary: #AAAAAA;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .flame {
            font-size: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <span class="flame">🔥</span> Appetite
        </div>
        
        <div class="spinner" id="spinner"></div>
        
        <h1 id="title">Confirming your account...</h1>
        <p id="subtitle">We're verifying your email address. Once complete, please return to the Appetite app to start ordering!</p>
        
        <div id="fallback" style="display: none; margin-top: 20px;">
            <p style="font-size: 14px; color: var(--text-secondary);">App didn't open? <a href="#" id="fallback-link" style="color: var(--primary); font-weight: bold; text-decoration: underline;">Tap here to open Appetite</a></p>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Appetite Inc.
    </div>

    <script>
        // Extract the search parameters AND the fragment (hash)
        const search = window.location.search;
        const hash = window.location.hash;
        
        // Priorities search parameters (modern PKCE code) then hash
        const deepLink = "exp+appetite-mobile://signup-callback" + (search || hash || "");
        
        // Update the fallback link just in case
        document.getElementById('fallback-link').href = deepLink;

        function attemptRedirect() {
            // For signup, if there's no hash or search it might be a valid direct hit or error
            if (!search && (!hash || hash.length < 10)) {
                console.log("No auth parameters detected, showing manual button as fallback.");
            }

            console.log("Attempting redirect to:", deepLink);
            
            // 1. Try to replace location (most reliable for many browsers)
            window.location.replace(deepLink);
            
            // 2. Set a timeout as a secondary attempt / fallback UI update
            setTimeout(() => {
                document.getElementById('title').innerText = "Email Verified!";
                document.getElementById('subtitle').innerText = "Your account is now ready. Please go back to the Appetite app on your device to sign in.";
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('fallback').style.display = 'block';
            }, 2500);
        }

        // Run the redirect on page load
        window.onload = attemptRedirect;
    </script>
</body>
</html>
