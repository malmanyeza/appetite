<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirming Your Account - Appetite</title>
    <style>
        :root {
            --primary: #FF4D00;
            --bg: #121212;
            --text: #FFFFFF;
            --text-secondary: #AAAAAA;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .flame {
            font-size: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <span class="flame">🔥</span> Appetite
        </div>
        
        <div class="spinner" id="spinner"></div>
        
        <h1 id="title">Confirming your account...</h1>
        <p id="subtitle">We're opening Appetite to verify your email address. You're almost ready to start ordering!</p>
        
        <a href="#" id="manual-btn" class="btn">Open Appetite App</a>
    </div>

    <div class="footer">
        &copy; 2026 Appetite Inc.
    </div>

    <script>
        // Extract the full fragment (hash) from the URL
        const hash = window.location.hash;
        
        // Use the Appetite custom scheme for sign-up callback
        const deepLink = "appetite://signup-callback" + hash;
        
        // Update the manual button just in case
        const btn = document.getElementById('manual-btn');
        btn.href = deepLink;

        function attemptRedirect() {
            // For signup, if there's no hash it might be a valid direct hit or error
            if (!hash || hash.length < 10) {
                console.log("No hash detected, showing manual button as fallback.");
            }

            console.log("Attempting redirect to:", deepLink);
            
            // 1. Try to replace location (most reliable for many browsers)
            window.location.replace(deepLink);
            
            // 2. Set a timeout as a secondary attempt / fallback UI update
            setTimeout(() => {
                document.getElementById('title').innerText = "Almost there!";
                document.getElementById('subtitle').innerText = "If the app didn't open automatically, please tap the button below to finish your sign-up.";
                document.getElementById('spinner').style.display = 'none';
            }, 2500);
        }

        // Run the redirect on page load
        window.onload = attemptRedirect;
    </script>
</body>
</html>
