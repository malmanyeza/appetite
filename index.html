<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appetite - Order Food Faster</title>
    <style>
        :root {
            --primary: #FF4D00;
            --bg: #0A0A0A;
            --text: #FFFFFF;
            --text-secondary: #AAAAAA;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .hero {
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }
        .logo {
            font-size: 64px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo span { font-size: 56px; }
        
        h1 { font-size: 40px; margin-bottom: 16px; font-weight: 800; }
        p { color: var(--text-secondary); font-size: 18px; margin-bottom: 40px; line-height: 1.5; }
        
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 16px 32px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn.secondary { background: rgba(255, 255, 255, 0.1); }

        /* Error Banner Styles */
        #error-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 59, 48, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #FF3B30;
            padding: 20px 40px;
            border-radius: 20px;
            display: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
        }
        .error-title { font-weight: 800; margin-bottom: 4px; display: block; }
        .error-desc { font-size: 14px; opacity: 0.9; }

        /* Backdrop Decoration */
        .gradient-blur {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="gradient-blur"></div>

    <!-- Smart Error Handling UI -->
    <div id="error-banner">
        <span class="error-title" id="err-title">Link Issue</span>
        <span class="error-desc" id="err-desc">Your authentication link has expired or reached its usage limit.</span>
    </div>

    <div class="hero">
        <div class="logo"><span>🔥</span> Appetite</div>
        <h1>Order Food Faster</h1>
        <p>Zimbabwe's most premium food delivery network. Connect with your favorite restaurants and get live order tracking in seconds.</p>
        
        <div class="btn-group">
            <a href="#" class="btn">Get it on Android</a>
            <a href="#" class="btn secondary">Coming to iOS</a>
        </div>
    </div>

    <script>
        // Automatic Error Detection Logic
        window.onload = () => {
            const hash = window.location.hash;
            if (hash.includes('error=')) {
                // Parse the fragment parameters
                const params = new URLSearchParams(hash.substring(1));
                const errorCode = params.get('error_code');
                const errorDesc = params.get('error_description');

                const banner = document.getElementById('error-banner');
                const title = document.getElementById('err-title');
                const desc = document.getElementById('err-desc');

                if (errorCode === 'otp_expired' || errorCode === 'access_denied') {
                    title.innerText = "Link Expired";
                    desc.innerText = "This secure link has already been used or is too old. Please request a new one from the Appetite app.";
                } else {
                    title.innerText = "Attention Needed";
                    desc.innerText = errorDesc || "There was a problem with the secure link.";
                }

                banner.style.display = 'block';
                
                // Dim the main content to focus on the error
                document.querySelector('.hero').style.opacity = '0.4';
            }
        };
    </script>
</body>
</html>
