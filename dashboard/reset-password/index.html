<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetting Your Password - Appetite</title>
    <style>
        :root {
            --primary: #FF4D00;
            --bg: #121212;
            --text: #FFFFFF;
            --text-secondary: #AAAAAA;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .flame {
            font-size: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
            Appetite
        
        <div class="spinner" id="spinner"></div>
        
        <h1 id="title">Taking you to the app...</h1>
        <p id="subtitle">We're opening the Appetite app so you can securely reset your password.</p>
        
        <a href="#" id="manual-btn" class="btn">Open Appetite App</a>
    </div>

    <div class="footer">
        &copy; 2026 Appetite Inc.
    </div>

    <script>
        // Extract the full fragment (hash) from the URL
        const hash = window.location.hash;
        
        // Use the Appetite custom scheme as the primary jump
        const deepLink = "appetite://reset-password" + hash;
        
        // Update the manual button just in case
        const btn = document.getElementById('manual-btn');
        btn.href = deepLink;

        function attemptRedirect() {
            // If there's no hash, the link might be malformed or already used
            if (!hash || hash.length < 10) {
                document.getElementById('title').innerText = "Invalid Link";
                document.getElementById('subtitle').innerText = "This password reset link appears to be invalid or expired.";
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('manual-btn').innerText = "Back to Site";
                document.getElementById('manual-btn').href = "/";
                return;
            }

            console.log("Attempting redirect to:", deepLink);
            
            // 1. Try to replace location (most reliable for many browsers)
            window.location.replace(deepLink);
            
            // 2. Set a timeout as a secondary attempt / fallback UI update
            setTimeout(() => {
                document.getElementById('title').innerText = "Almost there!";
                document.getElementById('subtitle').innerText = "If the app didn't open automatically, please tap the button below.";
                document.getElementById('spinner').style.display = 'none';
            }, 2500);
        }

        // Run the redirect on page load
        window.onload = attemptRedirect;
    </script>
</body>
</html>
